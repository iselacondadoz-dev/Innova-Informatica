<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innova Informática - ITSA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Inter', sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
    position:fixed;
    width:100%;
    background:rgba(15,23,42,0.9);
    backdrop-filter: blur(10px);
    z-index:1000;
}

.logo{
    font-weight:700;
    font-size:20px;
}

nav a{
    text-decoration:none;
    color:#cbd5e1;
    margin-left:25px;
}

nav a:hover{
    color:white;
}

.hero{
    height:100vh;
    background: url("hero.jpg");
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:#0f172a;
}

.convocatoria-section{
    padding:120px 80px;
    background:#0b1220;
}

.convocatoria-card{
    display:grid;
    grid-template-columns:1fr 1.1fr;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
}

.convocatoria-left{
    padding:60px;
    background:linear-gradient(135deg,#1e3a8a,#0f172a);
}

.hashtag{
    font-size:48px;
    color:#60a5fa;
}

.convocatoria-form{
    padding:50px;
}

.aviso{
    background:#7c2d12;
    padding:12px;
    border-radius:8px;
    margin:15px 0 25px 0;
}

.form-row{
    display:flex;
    gap:15px;
    margin-bottom:15px;
}

.form-row input,
.form-row select{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.folio-box{
    margin-top:20px;
    font-weight:bold;
    color:#22c55e;
}

@media(max-width:900px){
    .convocatoria-card{
        grid-template-columns:1fr;
    }
    .form-row{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">💻 Innova Informática</div>
</header>

<section class="hero"></section>

<section class="convocatoria-section">

    <div class="convocatoria-card">

        <div class="convocatoria-left">
            <h2>Convocatoria Nuevo Ingreso 2026</h2>
            <h1>Aquí se transforma tu futuro</h1>
            <p>Únete a nuestra Comunidad ITSA</p>
            <h1 class="hashtag">#SéArmadillo</h1>
        </div>

        <div class="convocatoria-form">

            <h3>PREREGISTRO DEL ASPIRANTE</h3>
            <div class="aviso">Una vez llenado el preregistro, continúa con el proceso de obtención de ficha.</div>

            <form 
              id="registroForm"
              action="https://script.google.com/macros/s/AKfycbyM4EzrKq4Zb7BMXh81l8EzrZzOo-ucLQ3y8UyyGaCZnUbEFX82KgUtFEdl8En0483Ewg/exec"
              method="POST"
              target="hidden_iframe"
            >

                <div class="form-row">
                    <input type="text" name="nombre" placeholder="Nombres" required>
                    <input type="text" name="apellidos" placeholder="Apellidos" required>
                </div>

                <div class="form-row">
                    <input type="email" name="correo" placeholder="Correo" required>
                    <input type="tel" name="telefono" placeholder="Teléfono" required>
                </div>

                <div class="form-row">
                    <input type="text" id="curp" name="curp" placeholder="CURP" maxlength="18" required>
                    <select name="ingenieria" required>
                        <option value="">Selecciona Ingeniería</option>
                        <option>Ingeniería Informática</option>
                        <option>Ingeniería Industrial</option>
                        <option>Gestión Empresarial</option>
                    </select>
                </div>

                <button type="submit">Enviar</button>

            </form>

            <iframe name="hidden_iframe" style="display:none;"></iframe>

            <div id="folioGenerado" class="folio-box"></div>

        </div>

    </div>

</section>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const form = document.getElementById("registroForm");

    function validarCURP(curp){
        const regex = /^[A-Z]{4}[0-9]{6}[HM][A-Z]{5}[0-9A-Z]{2}$/;
        return regex.test(curp);
    }

    form.addEventListener("submit", function(e){

        const curpInput = document.getElementById("curp").value.toUpperCase();

        if(!validarCURP(curpInput)){
            e.preventDefault();
            alert("CURP inválida. Verifica que esté correctamente escrita.");
            return;
        }

        document.getElementById("curp").value = curpInput;

        document.getElementById("folioGenerado").innerText =
            "Registro enviado correctamente. Tu folio será generado en el sistema.";

    });

});
</script>

</body>
</html>
